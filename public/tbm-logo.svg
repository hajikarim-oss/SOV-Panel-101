<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="600" height="120">
  <!-- Orange bracket above "BoredMon" -->
  <path d="M145 18 L145 8 L420 8 L420 18" stroke="#F58220" stroke-width="5" fill="none" stroke-linecap="round"/>
  <line x1="145" y1="18" x2="145" y2="30" stroke="#F58220" stroke-width="5" stroke-linecap="round"/>
  <line x1="420" y1="18" x2="420" y2="30" stroke="#F58220" stroke-width="5" stroke-linecap="round"/>

  <!-- "The" in black -->
  <text x="20" y="78" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="68" fill="#1A1A1A" letter-spacing="-2">The</text>

  <!-- "B" in orange -->
  <text x="132" y="78" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="68" fill="#F58220" letter-spacing="-2">B</text>

  <!-- "ored" in black -->
  <text x="183" y="78" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="68" fill="#1A1A1A" letter-spacing="-2">ored</text>

  <!-- "M" in black -->
  <text x="336" y="78" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="68" fill="#1A1A1A" letter-spacing="-2">M</text>

  <!-- "o" in orange with leaf -->
  <text x="407" y="78" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="68" fill="#F58220" letter-spacing="-2">o</text>
  <!-- leaf on top of orange o -->
  <path d="M443 26 Q448 14 456 18 Q450 22 448 30" fill="#F58220"/>

  <!-- "nkey" in black -->
  <text x="449" y="78" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="68" fill="#1A1A1A" letter-spacing="-2">nkey</text>

  <!-- "INSPIRED & CONVERSION" subtitle -->
  <text x="300" y="110" font-family="'Arial', 'Helvetica Neue', sans-serif" font-weight="600" font-size="18" fill="#F58220" text-anchor="middle" letter-spacing="6">INSPIRED &amp; CONVERSION</text>
